name: Hprofile Actions      #name-of-the-workflow. This name appears in the action tab.
on: workflow_dispatch       #mention-what-will-trigger-the-workflow
jobs:
  Testing:                  #name-of-the-job
    runs-on: ubuntu-latest   #specify-on-which-runner-you-need-to-run-this-job
    steps:
      - name: Code Checkout   
        uses: actions/checkout@v6   #checkout-the-code-to-the-runner
      
      - name: Maven Test
        run: mvn test   #run-the-maven-test-command

      - name: Checkstyle
        run: mvn checkstyle:checkstyle   #run-the-maven-checkstyle-command


# Setup java 17 to be default (sonar-scanner requirement as of 5.x)
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '17'

    # Setup sonar-scanner
      - name: Setup SonarQube
        uses: warchant/setup-sonar-scanner@v8
        with:
          version: 7.2.0.5079

    # Run sonar-scanner
      - name: SonarQube Scan
        run: sonar-scanner
            -Dsonar.host.url=${{ secrets.SONAR_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src/
            -Dsonar.junit.reportPaths=target/surefire-reports/
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.jacoco.reportPaths=target/jacoco.exec 
            -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
            -Dsonar.java.binaries=target/test-classes/com/visualpathit/account